# Netlify configuration for a Next.js (App Router) site.
# The official Next.js runtime plugin handles SSR, image optimization, and routing.
# IMPORTANT: do NOT set a "publish" directory here or in the Netlify UI —
# the plugin manages it. If the UI has a publish dir set to the repo root,
# clear it (Site config -> Build & deploy -> Build settings).

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
